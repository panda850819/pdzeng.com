name: Sync writing sources

on:
  schedule:
    # 17:20 UTC = 01:20 Asia/Taipei
    - cron: "20 17 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun scripts/sync-writing.ts
      - run: bun run build
      - name: Commit if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! git diff --quiet content/writing-sources.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/writing-sources.json
            git commit -m "chore: sync writing sources"
            git push
            gh workflow run deploy.yml --ref main
          else
            echo "no changes"
          fi
