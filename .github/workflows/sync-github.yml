name: Sync GitHub repos

on:
  schedule:
    # 17:00 UTC = 01:00 Asia/Taipei
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun scripts/sync-github.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit if changed
        run: |
          if ! git diff --quiet content/github-repos.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/github-repos.json
            git commit -m "chore: sync github repos"
            git push
          else
            echo "no changes"
          fi
